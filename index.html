<body>
<div class="loader" id="loader"><div><div class="ring"></div><h1>VORTEXIS</h1><p class="muted" style="letter-spacing:4px;text-align:center">ENTERPRISE V6</p></div></div>
<div class="noise"></div><div class="glow" id="glow"></div><div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div><div class="spark s5"></div>

<script>

const DEFAULT_BANNER='url(https://images.unsplash.com/photo-1611652022419-a9419f74343d?auto=format&fit=crop&w=2200&q=88)';
const defaultProducts=[
{id:1,name:'VORTEXIS Imperial Crown Diamond Ring',cat:'Ring',price:18900,stock:25,status:'Active',featured:true,img:'https://images.unsplash.com/photo-1602173574767-37ac01994b2a?auto=format&fit=crop&w=1200&q=88',desc:'A regal diamond ring with refined brilliance and timeless presence.',tag:'Best Seller'},
{id:2,name:'VORTEXIS Royal Gold Bracelet',cat:'Bracelet',price:13400,stock:10,status:'Active',featured:true,img:'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?auto=format&fit=crop&w=1200&q=88',desc:'A luminous gold bracelet designed for modern luxury styling.',tag:'Limited'},
{id:3,name:'VORTEXIS Celestial Diamond Necklace',cat:'Necklace',price:29900,stock:6,status:'Active',featured:true,img:'https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1200&q=88',desc:'Statement necklace with an elevated high-jewellery silhouette.',tag:'New'},
{id:4,name:'VORTEXIS Pearl Radiance Earrings',cat:'Earrings',price:9200,stock:18,status:'Active',featured:false,img:'https://images.unsplash.com/photo-1535632787350-4e68ef0ac584?auto=format&fit=crop&w=1200&q=88',desc:'Elegant earrings with pearl-inspired softness and sparkle.',tag:'Elegant'},
{id:5,name:'VORTEXIS Noir Diamond Band',cat:'Ring',price:15400,stock:0,status:'Active',featured:false,img:'https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=1200&q=88',desc:'Minimal but powerful ring design for refined daily luxury.',tag:'Sold Out'},
{id:6,name:'VORTEXIS Grandeur Sapphire Necklace',cat:'Necklace',price:35500,stock:3,status:'Active',featured:true,img:'https://images.unsplash.com/photo-1611652022419-a9419f74343d?auto=format&fit=crop&w=1200&q=88',desc:'A dramatic necklace crafted for gala and bridal occasions.',tag:'VIP'}];
const store={get(k,d){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
let products=store.get('vx_products',defaultProducts),cart=store.get('vx_cart',[]),wish=store.get('vx_wish',[]),orders=store.get('vx_orders',[]),settings=store.get('vx_settings',{hero:DEFAULT_HERO.replace('url(','').replace(')',''),banner:DEFAULT_BANNER.replace('url(','').replace(')',''),whatsapp:'',salesEmail:'sales@vortexis.com',vipEmail:'vip@vortexis.com'}),activeCat='All',editId=null,adminSec='dashboard';
const money=n=>'US$'+Number(n||0).toLocaleString();
function persist(){store.set('vx_products',products);store.set('vx_cart',cart);store.set('vx_wish',wish);store.set('vx_orders',orders);store.set('vx_settings',settings)}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modal').classList.add('show');document.body.classList.add('no-scroll')}function closeModal(){document.getElementById('modal').classList.remove('show');document.body.classList.remove('no-scroll')}function openDrawer(html){document.getElementById('drawerContent').innerHTML=html;document.getElementById('drawer').classList.add('show');document.body.classList.add('no-scroll')}function closeDrawer(){document.getElementById('drawer').classList.remove('show');document.body.classList.remove('no-scroll')}
function showCustomer(){document.getElementById('customerApp').classList.remove('hide');document.getElementById('adminLogin').classList.add('hide');document.getElementById('adminApp').classList.add('hide');renderCustomer()}function showLogin(){document.getElementById('customerApp').classList.add('hide');document.getElementById('adminApp').classList.add('hide');document.getElementById('adminLogin').classList.remove('hide');renderLogin()}function showAdmin(){document.getElementById('customerApp').classList.add('hide');document.getElementById('adminLogin').classList.add('hide');document.getElementById('adminApp').classList.remove('hide');renderAdmin()}
function go(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'})}
function renderCustomer(){document.documentElement.style.setProperty('--hero',`url(${settings.hero})`);document.documentElement.style.setProperty('--banner',`url(${settings.banner})`);let app=document.getElementById('customerApp');app.innerHTML=`<nav class="nav"><div class="brand"><div class="logo"></div><div class="brandTxt">VORTEXIS</div></div><div class="links"><button onclick="go('collections')">Collections</button><button onclick="go('experience')">Experience</button><button onclick="go('vip')">VIP</button><button onclick="showLogin()">Admin</button></div><div><button class="iconBtn" onclick="focusSearch()">Search</button><button class="iconBtn" onclick="openWishlist()">♡ <span class="badge">${wish.length}</span></button><button class="iconBtn" onclick="openCart()">Cart <span class="badge">${cart.reduce((s,i)=>s+i.qty,0)}</span></button></div></nav><section class="hero" id="home"><div><div class="eyebrow">VORTEXIS Luxury Jewelry Maison</div><h1>The Signature of Elegance</h1><p>Premium online jewelry boutique with admin-controlled products, images, stock, orders, banners and customer shopping flow.</p><div class="heroBtns"><button class="btn primary" onclick="go('collections')">Shop VORTEXIS</button><button class="btn secondary" onclick="booking()">Book Private Viewing</button><button class="btn secondary" onclick="wa()">WhatsApp Concierge</button></div></div><div class="heroCard"><img src="${products[0]?.img||settings.hero}"><div class="mini"><div><strong>GIA</strong>Certified</div><div><strong>Admin</strong>Editable</div><div><strong>VIP</strong>Service</div></div></div></section><section class="section"><div class="stats"><div class="stat"><h2>${products.length}+</h2><p>Products</p></div><div class="stat"><h2>${orders.length}</h2><p>Orders</p></div><div class="stat"><h2>${products.filter(p=>p.stock<=3).length}</h2><p>Low Stock</p></div><div class="stat"><h2>24/7</h2><p>Concierge</p></div></div></section><section class="section" id="collections"><div class="titleWrap"><h2 class="title">VORTEXIS Collections</h2><p class="muted">This customer page is connected to the same LocalStorage database managed by the admin portal.</p></div><div class="toolbar"><div class="filters">${['All','Ring','Necklace','Bracelet','Earrings'].map(c=>`<button class="filterBtn ${activeCat==c?'active':''}" onclick="setCat('${c}',this)">${c}</button>`).join('')}</div><div class="search"><span>⌕</span><input id="searchInput" oninput="renderProducts()" placeholder="Search jewelry..."></div></div><div class="products" id="productGrid"></div></section><section class="section"><div class="showcase"><div><h2>Crafted For Life's Finest Moments</h2><br><button class="btn primary" onclick="go('vip')">Enter VIP Circle</button></div></div></section><section class="section" id="experience"><div class="titleWrap"><h2 class="title">The VORTEXIS Experience</h2></div><div class="experience"><div class="glass">💎<h3 class="gold">Product Admin</h3><p class="muted">Add/Edit/Delete products from admin.</p></div><div class="glass">🖼️<h3 class="gold">Image Upload</h3><p class="muted">Upload product photos as base64 demo storage.</p></div><div class="glass">📦<h3 class="gold">Inventory</h3><p class="muted">Stock status updates customer view.</p></div><div class="glass">🧾<h3 class="gold">Orders</h3><p class="muted">Checkout creates admin orders.</p></div></div></section><section class="section" id="vip"><div class="vip"><h2 class="title">VORTEXIS Private VIP Consultation</h2><p class="muted">Submit an enquiry; it creates a ready email using your settings.</p><div class="formGrid"><input class="field" id="vipName" placeholder="Your Name"><input class="field" id="vipContact" placeholder="Email / Phone"><select class="field" id="vipInterest"><option>Diamond Ring</option><option>Necklace</option><option>Bracelet</option><option>Earrings</option><option>Bespoke Design</option></select><select class="field"><option>Budget: US$5,000 - US$10,000</option><option>Budget: US$10,000 - US$25,000</option><option>Budget: Above US$50,000</option></select><textarea class="field full" id="vipMsg" rows="4" placeholder="Tell VORTEXIS what you are looking for..."></textarea></div><br><button class="btn primary" onclick="vipSubmit()">Submit VIP Enquiry</button> <button class="btn secondary" onclick="wa()">Chat on WhatsApp</button></div></section><footer class="footer"><div><b class="gold" style="font-family:Cinzel">VORTEXIS</b><br>Enterprise V6 Customer + Admin Demo</div><div><button class="btn secondary" onclick="go('home')">Back To Top</button> <button class="btn secondary" onclick="showLogin()">Admin Portal</button></div></footer>`;renderProducts()}
function setCat(c,btn){activeCat=c;document.querySelectorAll('.filterBtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts()}function focusSearch(){go('collections');setTimeout(()=>document.getElementById('searchInput')?.focus(),350)}
function renderProducts(){let q=(document.getElementById('searchInput')?.value||'').toLowerCase();let list=products.filter(p=>p.status==='Active'&&(activeCat==='All'||p.cat===activeCat)&&(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)));document.getElementById('productGrid').innerHTML=list.map(p=>`<div class="card ${p.stock<1?'sold':''}"><span class="tag">${p.stock<1?'Sold Out':p.tag||'VORTEXIS'}</span><button class="wish ${wish.includes(p.id)?'active':''}" onclick="toggleWish(${p.id})">♡</button><img src="${p.img}"><div class="body"><h3>${p.name}</h3><p class="desc">${p.desc}</p><div class="priceRow"><span class="price">${money(p.price)}</span><span class="stock ${p.stock<1?'out':p.stock<=3?'low':'muted'}">${p.stock<1?'Sold Out':p.stock<=3?'Low Stock':'In Stock'}</span></div><br><button class="btn secondary" onclick="quick(${p.id})">Quick View</button> <button class="btn primary" ${p.stock<1?'disabled':''} onclick="addCart(${p.id})">Add To Cart</button></div></div>`).join('')||'<p class="muted">No product found.</p>'}
function quick(id){let p=products.find(x=>x.id===id);openModal(`<div class="quickGrid"><img src="${p.img}"><div><div class="eyebrow">${p.cat}</div><h2 class="title" style="text-align:left">${p.name}</h2><p class="muted">${p.desc}</p><br><h2 class="gold">${money(p.price)}</h2><p class="muted">Stock: ${p.stock}</p><br><button class="btn primary" onclick="addCart(${p.id});closeModal()" ${p.stock<1?'disabled':''}>Add To Cart</button> <button class="btn secondary" onclick="toggleWish(${p.id})">Wishlist</button><br><br><button class="btn secondary" onclick="wa('${p.name}')">Ask Concierge</button></div></div>`)}
function addCart(id){let p=products.find(x=>x.id===id);if(!p||p.stock<1){toast('Product is sold out');return}let i=cart.find(x=>x.id===id);i?i.qty++:cart.push({id,qty:1});persist();toast('Added to cart');renderCustomer()}function toggleWish(id){wish=wish.includes(id)?wish.filter(x=>x!==id):[...wish,id];persist();toast(wish.includes(id)?'Added to wishlist':'Removed from wishlist');renderCustomer()}function openWishlist(){go('collections');let grid=document.getElementById('productGrid');let list=products.filter(p=>wish.includes(p.id));grid.innerHTML=list.map(p=>`<div class="card"><span class="tag">Wishlist</span><button class="wish active" onclick="toggleWish(${p.id})">♡</button><img src="${p.img}"><div class="body"><h3>${p.name}</h3><p class="desc">${p.desc}</p><span class="price">${money(p.price)}</span><br><br><button class="btn primary" onclick="addCart(${p.id})">Add To Cart</button></div></div>`).join('')||'<p class="muted">Wishlist is empty.</p>';toast('Wishlist opened')}
function openCart(){let total=cart.reduce((s,i)=>s+(products.find(p=>p.id===i.id)?.price||0)*i.qty,0);openDrawer(`<h2 class="title" style="text-align:left;font-size:31px">Shopping Cart</h2><div>${cart.length?cart.map(i=>{let p=products.find(x=>x.id===i.id)||{};return `<div class="cartItem"><img src="${p.img}"><div><b>${p.name}</b><br><span class="gold">${money(p.price)}</span><div class="qty"><button class="round" onclick="qty(${p.id},-1)">−</button><span>${i.qty}</span><button class="round" onclick="qty(${p.id},1)">+</button></div></div><button class="round" onclick="removeCart(${p.id})">×</button></div>`}).join(''):'<p class="muted">Cart is empty.</p>'}</div><br><h2>Total: <span class="gold">${money(total)}</span></h2><br><button class="btn primary" style="width:100%" onclick="checkout()">Checkout</button><br><br><button class="btn secondary" style="width:100%" onclick="cart=[];persist();closeDrawer();renderCustomer();toast('Cart cleared')">Clear Cart</button>`)}function qty(id,d){let i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);persist();openCart();renderCustomer()}function removeCart(id){cart=cart.filter(x=>x.id!==id);persist();openCart();renderCustomer()}
function checkout(){if(!cart.length){toast('Cart is empty');return}let order={id:'VX'+Date.now(),date:new Date().toLocaleString(),status:'Pending Payment',items:cart,total:cart.reduce((s,i)=>s+(products.find(p=>p.id===i.id)?.price||0)*i.qty,0),customer:'Walk-in / Demo Customer'};orders.unshift(order);cart.forEach(i=>{let p=products.find(x=>x.id===i.id);if(p)p.stock=Math.max(0,p.stock-i.qty)});cart=[];persist();closeDrawer();renderCustomer();toast('Order created in Admin Portal');let body=encodeURIComponent('Hello VORTEXIS, I would like to proceed with order '+order.id+' total '+money(order.total));location.href=`mailto:${settings.salesEmail}?subject=VORTEXIS Order ${order.id}&body=${body}`}
function wa(product=''){let text=encodeURIComponent('Hello VORTEXIS, I am interested in '+(product||'your luxury jewelry collection')+'. Please assist me.');if(settings.whatsapp)window.open('https://wa.me/'+settings.whatsapp+'?text='+text,'_blank');else window.open('https://wa.me/?text='+text,'_blank')}function vipSubmit(){let body=encodeURIComponent(`Name: ${vipName.value}\nContact: ${vipContact.value}\nInterest: ${vipInterest.value}\nMessage: ${vipMsg.value}`);location.href=`mailto:${settings.vipEmail}?subject=VORTEXIS VIP Enquiry&body=${body}`;toast('VIP enquiry email created')}function booking(){openModal(`<h2 class="title">Book VORTEXIS Private Viewing</h2><div class="formGrid"><input class="field" id="bn" placeholder="Name"><input class="field" id="bc" placeholder="Contact"><input class="field" id="bd" type="date"><select class="field" id="bt"><option>Private showroom viewing</option><option>Virtual consultation</option><option>Bespoke design session</option></select></div><br><button class="btn primary" onclick="let body=encodeURIComponent('Name: '+bn.value+'\\nContact: '+bc.value+'\\nDate: '+bd.value+'\\nType: '+bt.value);location.href='mailto:${settings.vipEmail}?subject=VORTEXIS Private Viewing&body='+body;toast('Booking email created')">Create Appointment Request</button>`)}
function renderLogin(){document.getElementById('adminLogin').innerHTML=`<div class="loginBox"><div class="logo" style="margin:0 auto 15px"></div><h1>VORTEXIS Admin</h1><p class="muted">Demo password: <b class="gold">admin123</b></p><input id="adminPw" type="password" placeholder="Enter admin password"><button class="btn primary" style="width:100%" onclick="login()">Login</button><br><br><button class="btn secondary" onclick="showCustomer()">Back to Website</button></div>`}function login(){if(document.getElementById('adminPw').value==='admin123')showAdmin();else toast('Wrong password')}
function renderAdmin(){let app=document.getElementById('adminApp');app.innerHTML=`<div class="adminTop"><div class="brand"><div class="logo"></div><div><div class="brandTxt">VORTEXIS ADMIN</div><div class="muted" style="font-size:12px">Enterprise V6 Demo Back Office</div></div></div><div><button class="btn secondary" onclick="showCustomer()">View Store</button> <button class="btn danger" onclick="showLogin()">Logout</button></div></div><div class="adminShell"><div class="side">${['dashboard','products','orders','inventory','banners','settings'].map(s=>`<button class="${adminSec==s?'active':''}" onclick="adminSec='${s}';renderAdmin()">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}</div><div class="adminMain" id="adminMain"></div></div>`;renderAdminSection()}
function renderAdminSection(){let m=document.getElementById('adminMain');let revenue=orders.reduce((s,o)=>s+o.total,0);if(adminSec==='dashboard')m.innerHTML=`<h1 class="title" style="text-align:left">Dashboard</h1><div class="kpis"><div class="kpi"><h2>${money(revenue)}</h2><p>Total Revenue</p></div><div class="kpi"><h2>${orders.length}</h2><p>Total Orders</p></div><div class="kpi"><h2>${products.length}</h2><p>Products</p></div><div class="kpi"><h2>${products.filter(p=>p.stock<=3).length}</h2><p>Low Stock</p></div></div><div class="adminGrid"><div class="glass"><h2 class="gold">Recent Orders</h2><br>${orderTable(orders.slice(0,5))}</div><div class="glass"><h2 class="gold">Quick Actions</h2><br><button class="btn primary" onclick="adminSec='products';renderAdmin()">Add Product</button><br><br><button class="btn secondary" onclick="adminSec='banners';renderAdmin()">Edit Banners</button><br><br><button class="btn secondary" onclick="exportData()">Export Data</button></div></div>`;
if(adminSec==='products')m.innerHTML=`<h1 class="title" style="text-align:left">Product Management</h1><div class="adminGrid"><div>${productTable()}</div><div class="glass"><h2 class="gold">${editId?'Edit':'Add'} Product</h2><br>${productForm()}</div></div>`;
if(adminSec==='orders')m.innerHTML=`<h1 class="title" style="text-align:left">Order Management</h1>${orderTable(orders,true)}`;
if(adminSec==='inventory')m.innerHTML=`<h1 class="title" style="text-align:left">Inventory</h1>${inventoryTable()}`;
if(adminSec==='banners')m.innerHTML=`<h1 class="title" style="text-align:left">Banner Manager</h1><div class="adminGrid"><div class="glass"><h2 class="gold">Current Preview</h2><br><img src="${settings.hero}" style="width:100%;height:220px;object-fit:cover;border-radius:18px"><br><br><img src="${settings.banner}" style="width:100%;height:220px;object-fit:cover;border-radius:18px"></div><div class="glass"><h2 class="gold">Update Images</h2><br><label>Hero Image URL</label><input class="field" id="setHero" value="${settings.hero}"><br><br><label>Banner Image URL</label><input class="field" id="setBanner" value="${settings.banner}"><br><br><label>Or Upload Hero Image</label><input type="file" id="heroUpload" accept="image/*" class="field"><br><br><label>Or Upload Banner Image</label><input type="file" id="bannerUpload" accept="image/*" class="field"><br><br><button class="btn primary" onclick="saveBanners()">Save Banner Settings</button></div></div>`;
if(adminSec==='settings')m.innerHTML=`<h1 class="title" style="text-align:left">Settings</h1><div class="glass" style="max-width:650px"><label>Sales Email</label><input class="field" id="salesEmail" value="${settings.salesEmail}"><br><br><label>VIP Email</label><input class="field" id="vipEmail" value="${settings.vipEmail}"><br><br><label>WhatsApp Number (country code, no +)</label><input class="field" id="waNo" value="${settings.whatsapp}" placeholder="60123456789"><br><br><button class="btn primary" onclick="settings.salesEmail=salesEmail.value;settings.vipEmail=vipEmail.value;settings.whatsapp=waNo.value;persist();toast('Settings saved')">Save Settings</button> <button class="btn danger" onclick="resetDemo()">Reset Demo Data</button></div>`}
function productTable(){return `<table class="adminTable"><tr><th>Photo</th><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr>${products.map(p=>`<tr><td><img class="thumb" src="${p.img}"></td><td>${p.name}<br><span class="pill">${p.tag||''}</span></td><td>${p.cat}</td><td>${money(p.price)}</td><td class="${p.stock<1?'out':p.stock<=3?'low':''}">${p.stock}</td><td>${p.status}</td><td class="actions"><button class="miniBtn" onclick="editProduct(${p.id})">Edit</button><button class="miniBtn" onclick="dupeProduct(${p.id})">Copy</button><button class="miniBtn" onclick="deleteProduct(${p.id})">Delete</button></td></tr>`).join('')}</table>`}
function productForm(){let p=products.find(x=>x.id===editId)||{id:'',name:'',cat:'Ring',price:'',stock:'',status:'Active',featured:false,img:'',desc:'',tag:''};return `<div class="adminForm"><label>Product Name</label><input id="pName" value="${p.name}"><label>Category</label><select id="pCat"><option ${p.cat==='Ring'?'selected':''}>Ring</option><option ${p.cat==='Necklace'?'selected':''}>Necklace</option><option ${p.cat==='Bracelet'?'selected':''}>Bracelet</option><option ${p.cat==='Earrings'?'selected':''}>Earrings</option></select><label>Price</label><input id="pPrice" type="number" value="${p.price}"><label>Stock</label><input id="pStock" type="number" value="${p.stock}"><label>Status</label><select id="pStatus"><option ${p.status==='Active'?'selected':''}>Active</option><option ${p.status==='Hidden'?'selected':''}>Hidden</option></select><label>Tag</label><input id="pTag" value="${p.tag}"><label>Description</label><textarea id="pDesc" rows="3">${p.desc}</textarea><label>Image URL</label><input id="pImg" value="${p.img}"><label>Or Upload Image</label><input id="pUpload" type="file" accept="image/*"><button class="btn primary" onclick="saveProduct()">${editId?'Update Product':'Add Product'}</button>${editId?'<button class="btn secondary" onclick="editId=null;renderAdmin()">Cancel Edit</button>':''}</div>`}
function saveProduct(){let done=(img)=>{let data={id:editId||Date.now(),name:pName.value,cat:pCat.value,price:+pPrice.value,stock:+pStock.value,status:pStatus.value,img:img||pImg.value,desc:pDesc.value,tag:pTag.value};if(editId)products=products.map(p=>p.id===editId?data:p);else products.unshift(data);editId=null;persist();renderAdmin();toast('Product saved')};let f=pUpload.files[0];if(f){let r=new FileReader();r.onload=e=>done(e.target.result);r.readAsDataURL(f)}else done(pImg.value)}function editProduct(id){editId=id;renderAdmin()}function dupeProduct(id){let p=products.find(x=>x.id===id);products.unshift({...p,id:Date.now(),name:p.name+' Copy'});persist();renderAdmin();toast('Product copied')}function deleteProduct(id){if(confirm('Delete this product?')){products=products.filter(p=>p.id!==id);persist();renderAdmin();toast('Product deleted')}}
function orderTable(list,full=false){return `<table class="adminTable"><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th>${full?'<th>Action</th>':''}</tr>${list.map(o=>`<tr><td>${o.id}</td><td>${o.date}</td><td>${o.customer}</td><td>${money(o.total)}</td><td>${o.status}</td>${full?`<td><select onchange="oStatus('${o.id}',this.value)"><option ${o.status==='Pending Payment'?'selected':''}>Pending Payment</option><option ${o.status==='Paid'?'selected':''}>Paid</option><option ${o.status==='Shipped'?'selected':''}>Shipped</option><option ${o.status==='Completed'?'selected':''}>Completed</option><option ${o.status==='Cancelled'?'selected':''}>Cancelled</option></select></td>`:''}</tr>`).join('')||'<tr><td colspan="6">No orders yet. Create checkout from customer view.</td></tr>'}</table>`}function oStatus(id,v){orders=orders.map(o=>o.id===id?{...o,status:v}:o);persist();toast('Order updated')}
function inventoryTable(){return `<table class="adminTable"><tr><th>Product</th><th>Stock</th><th>Status</th><th>Adjust</th></tr>${products.map(p=>`<tr><td>${p.name}</td><td class="${p.stock<1?'out':p.stock<=3?'low':''}">${p.stock}</td><td>${p.stock<1?'Out of Stock':p.stock<=3?'Low Stock':'Healthy'}</td><td><button class="miniBtn" onclick="adjStock(${p.id},-1)">-</button> <button class="miniBtn" onclick="adjStock(${p.id},1)">+</button></td></tr>`).join('')}</table>`}function adjStock(id,d){products=products.map(p=>p.id===id?{...p,stock:Math.max(0,p.stock+d)}:p);persist();renderAdmin()}
function saveBanners(){let save=()=>{settings.hero=setHero.value;settings.banner=setBanner.value;persist();toast('Banner saved');renderAdmin()};let h=heroUpload.files[0],b=bannerUpload.files[0];if(h){let r=new FileReader();r.onload=e=>{setHero.value=e.target.result;if(b){let r2=new FileReader();r2.onload=x=>{setBanner.value=x.target.result;save()};r2.readAsDataURL(b)}else save()};r.readAsDataURL(h)}else if(b){let r=new FileReader();r.onload=e=>{setBanner.value=e.target.result;save()};r.readAsDataURL(b)}else save()}
function exportData(){let blob=new Blob([JSON.stringify({products,orders,settings},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vortexis-demo-data.json';a.click();toast('Data exported')}function resetDemo(){if(confirm('Reset all demo data?')){localStorage.removeItem('vx_products');localStorage.removeItem('vx_cart');localStorage.removeItem('vx_wish');localStorage.removeItem('vx_orders');localStorage.removeItem('vx_settings');location.reload()}}
document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px'});window.addEventListener('load',()=>setTimeout(()=>loader.classList.add('off'),650));showCustomer();
</script>
</body></html>
